<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acordes - App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Identificador de Tom</h1>
        <div class="layout-grid">

            <!-- PAINEL ESQUERDO -->
            <div class="painel-esquerdo">
                <p>Digite os acordes separados por vírgula:</p>
                <input type="text" id="inputAcordes" placeholder="Ex: C, F, G">
                <button onclick="identificarTom()">Descobrir Tom</button>

                <div class="afinador-container">
                    <h3 class="afinador-titulo">🎤 Afinador / Voz</h3>
                    <p class="afinador-subtitulo">Cante uma nota ou toque uma corda.</p>
                    <button id="btnAfinador" onclick="iniciarAfinador()">Ligar Microfone</button>
                    <div id="notaDetectada">--</div>
                    <div id="frequenciaDetectada">-- Hz</div>
                </div>
            </div>

            <!-- PAINEL DIREITO -->
            <div class="painel-direito">

                <div id="resultado" class="resultado-box" style="display:none;">
                    Aguardando acordes...
                </div>

                <!-- GPS HARMÔNICO -->
                <div id="rotas-container" class="gps-container">
                    <h3 class="gps-titulo">🧭 GPS Harmônico</h3>
                    <p class="gps-subtitulo">Trace a melhor rota de rearmonização entre dois acordes.</p>
                    <div class="gps-inputs">
                        <input type="text" id="acordeOrigem" placeholder="Acorde Atual (ex: C)" class="gps-input">
                        <span class="gps-seta">➔</span>
                        <input type="text" id="acordeDestino" placeholder="Acorde Alvo (ex: F)" class="gps-input">
                    </div>
                    <button id="btnTracaRotas" onclick="gerarRotas()">Traçar Caminhos</button>
                    <div id="resultado-rotas" style="margin-top:20px;display:flex;flex-direction:column;gap:15px;"></div>
                </div>

                <!-- VARIAÇÕES -->
                <div id="variacoes-container" style="display:none;margin-top:20px;">
                    <h3 class="variacoes-titulo">Variações de Acordes</h3>
                    <div id="gradeVariacoes" class="grade-botoes"></div>
                </div>

                <!-- DIAGRAMA DO ACORDE -->
                <div id="chord-diagram-container" style="display:none;margin-top:20px;text-align:center;">
                    <h3 id="nomeAcordeDestaque" class="diagrama-titulo">--</h3>
                    <div class="diagrama-tabs">
                        <button id="tab-guitarra" class="tab-btn ativo" onclick="mudarVisaoDiagrama('guitarra')">🎸 Violão</button>
                        <button id="tab-teclado" class="tab-btn" onclick="mudarVisaoDiagrama('teclado')">🎹 Teclado</button>
                    </div>
                    <div class="chord-card" id="chord-card-box">
                        <div id="chord-visual-area"></div>
                    </div>
                </div>

                <!-- BRAÇO DO INSTRUMENTO -->
                <div id="fretboard-container" style="display:none;margin-top:20px;">
                    <div class="braco-header">
                        <h3 class="braco-titulo">Escala no Braço</h3>
                        <select id="seletorInstrumento" onchange="atualizarBraco()">
                            <option value="guitarra">Guitarra/Violão (6 Cordas)</option>
                            <option value="baixo">Contrabaixo (4 Cordas)</option>
                        </select>
                    </div>
                    <div class="fretboard-wrapper">
                        <div class="fretboard" id="fretboard"></div>
                    </div>
                </div>

            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
